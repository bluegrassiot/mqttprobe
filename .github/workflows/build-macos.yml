name: Build macOS (Mac Catalyst)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.0.1 or v1.0.1)'
        required: false
        default: '0.0.1'
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp (tag name, e.g. v1.0.1)'
        required: true
        type: string
    secrets:
      MACOS_CERT_P12:
        description: 'Developer ID Application cert + key, .p12, base64-encoded'
        required: true
      MACOS_CERT_PASSWORD:
        description: 'Password protecting the .p12'
        required: true
      NOTARY_KEY_P8:
        description: 'App Store Connect API key (.p8 contents, plain text)'
        required: true
      NOTARY_KEY_ID:
        description: 'App Store Connect API key ID'
        required: true
      NOTARY_ISSUER_ID:
        description: 'App Store Connect issuer ID'
        required: true
      MACOS_INSTALLER_CERT_P12:
        description: 'Developer ID Installer cert + key, .p12, base64-encoded'
        required: true
      MACOS_INSTALLER_CERT_PASSWORD:
        description: 'Password protecting the installer .p12'
        required: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  # Subject Common Names of the signing certificates, as they appear in
  # `security find-identity -v`. Not secrets: they are embedded in every signed
  # binary. The "Verify signing identities" step asserts both exist before the
  # build runs, so a mismatch fails in seconds rather than during vpk pack.
  SIGN_APP_IDENTITY: "Developer ID Application: Bluegrass IOT LLC (XVKMB6CQ72)"
  SIGN_INSTALL_IDENTITY: "Developer ID Installer: Bluegrass IOT LLC (XVKMB6CQ72)"

jobs:
  build-maui-macos:
    name: Build (MAUI macOS)
    # Pinned to macos-26: macos-latest is mid-migration (15 -> 26, June/July 2026),
    # and macOS 15's default Xcode 16.4 cannot build net10.0 Apple targets.
    # macos-26's default Xcode may lag behind the MacCatalyst workload requirement
    # (e.g. Microsoft.MacCatalyst.Sdk 26.5.10301 requires Xcode 26.6). We explicitly
    # select the matching Xcode below. If the job fails with "requires Xcode X.Y",
    # update the xcode-select path to that version.
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.6
        run: sudo xcode-select -s /Applications/Xcode_26.6.app

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Install MAUI Mac Catalyst workload
        run: dotnet workload install maui-maccatalyst --source https://api.nuget.org/v3/index.json

      - name: Extract and validate version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          version="${RAW#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]] || [[ "$version" == "0.0.0" ]]; then
            echo "::error::Version '$version' is invalid. Provide a version >= 0.0.1 (e.g. 1.0.2 or v1.0.2)."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          IFS='.-' read -r major minor patch _ <<< "$version"
          # Guard non-numeric components from bad inputs that still matched loosely
          if ! [[ "$major" =~ ^[0-9]+$ && "$minor" =~ ^[0-9]+$ && "$patch" =~ ^[0-9]+$ ]]; then
            echo "::error::Version '$version' must start with numeric major.minor.patch."
            exit 1
          fi
          echo "code=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate into temporary keychain
        env:
          CERT_P12_B64: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          INSTALLER_CERT_P12_B64: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          [ -n "$CERT_P12_B64" ] || { echo "::error::MACOS_CERT_P12 secret is not set"; exit 1; }
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$KEYCHAIN_PASSWORD" > "$RUNNER_TEMP/keychain-password"
          chmod 600 "$RUNNER_TEMP/keychain-password"
          echo "$CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"
          [ -n "$INSTALLER_CERT_P12_B64" ] || { echo "::error::MACOS_INSTALLER_CERT_P12 secret is not set"; exit 1; }
          echo "$INSTALLER_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$INSTALLER_CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/security
          rm "$RUNNER_TEMP/installer.p12"
          # Allow Apple's signing tools to use the key without a GUI consent prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      - name: Verify signing identities
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "Identities present in the CI keychain:"
          security find-identity -v "$KEYCHAIN"
          for IDENTITY in "$SIGN_APP_IDENTITY" "$SIGN_INSTALL_IDENTITY"; do
            security find-identity -v "$KEYCHAIN" | grep -qF "$IDENTITY" || {
              echo "::error::Signing identity not found: $IDENTITY — compare it against the list above and correct SIGN_APP_IDENTITY / SIGN_INSTALL_IDENTITY in this workflow's env block."
              exit 1
            }
          done

      - name: Create notarytool profile
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          [ -n "$NOTARY_KEY_P8" ] || { echo "::error::NOTARY_KEY_P8 secret is not set"; exit 1; }
          echo "$NOTARY_KEY_P8" > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool store-credentials velopack-profile \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --keychain "$RUNNER_TEMP/signing.keychain-db"
          rm "$RUNNER_TEMP/notary.p8"

      - name: Publish (unsigned — vpk signs during pack)
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-maccatalyst
          -p:MqttProbeMauiMacTargetFrameworksOverride=net10.0-maccatalyst
          -c:Release
          -p:RuntimeIdentifiers='"maccatalyst-x64;maccatalyst-arm64"'
          -p:CreatePackage=false
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}

      - name: Verify universal binary and signature
        run: |
          # --output is ignored for Apple bundles; the universal .app lands at the TFM root
          APP=$(find src/MqttProbe.Maui/bin/Release/net10.0-maccatalyst -maxdepth 1 -name '*.app' -print -quit)
          test -n "$APP" || { echo "No .app bundle found in publish output"; exit 1; }
          EXE="$APP/Contents/MacOS/$(defaults read "$(pwd)/$APP/Contents/Info.plist" CFBundleExecutable)"
          lipo -archs "$EXE"
          lipo -archs "$EXE" | grep -q x86_64
          lipo -archs "$EXE" | grep -q arm64

      - name: Install Velopack CLI
        run: |
          # --version here is for dotnet tool install (pin), not the vpk CLI.
          # vpk has no --version flag; it prints its version when packing.
          dotnet tool install -g vpk --version 1.2.0
          command -v vpk

      - name: Velopack pack (sign, notarize, staple)
        timeout-minutes: 12
        run: |
          APP=$(find src/MqttProbe.Maui/bin/Release/net10.0-maccatalyst -maxdepth 1 -name '*.app' -print -quit)
          test -n "$APP" || { echo "No .app bundle found"; exit 1; }
          EXE_NAME=$(defaults read "$(pwd)/$APP/Contents/Info.plist" CFBundleExecutable)
          test -x "$APP/Contents/MacOS/$EXE_NAME" || {
            echo "::error::Main executable not found: $APP/Contents/MacOS/$EXE_NAME"
            ls -la "$APP/Contents/MacOS/" || true
            exit 1
          }
          # Re-unlock keychain and re-apply partition list so productsign can
          # access the Installer cert without a GUI prompt (the keychain may
          # have been re-locked or the partition list lost between steps).
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(cat "$RUNNER_TEMP/keychain-password")
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          echo "Starting vpk pack at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          vpk download github --repoUrl https://github.com/bluegrassiot/mqttprobe --token ${{ secrets.GITHUB_TOKEN }} --outputDir publish/velopack-osx || echo "No previous Velopack osx release; deltas skipped."
          vpk pack \
            --packId MQTTProbe \
            --packVersion ${{ steps.version.outputs.value }} \
            --packDir "$APP" \
            --mainExe "$EXE_NAME" \
            --packTitle MQTTProbe \
            --packAuthors "Bluegrass IoT" \
            --signAppIdentity "$SIGN_APP_IDENTITY" \
            --signInstallIdentity "$SIGN_INSTALL_IDENTITY" \
            --notaryProfile velopack-profile \
            --keychain "$RUNNER_TEMP/signing.keychain-db" \
            --outputDir publish/velopack-osx
          find publish/velopack-osx -name '*.nupkg' ! -name "MQTTProbe-${{ steps.version.outputs.value }}-*" -delete
          ls -la publish/velopack-osx
          echo "Finished vpk pack at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-macos-velopack
          path: publish/velopack-osx/

      - name: Clean up signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/keychain-password" \
                "$RUNNER_TEMP/cert.p12" \
                "$RUNNER_TEMP/installer.p12" \
                "$RUNNER_TEMP/notary.p8"
