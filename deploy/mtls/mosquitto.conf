listener 1883
allow_anonymous true

listener 8883
allow_anonymous true
cafile /certs/ca.crt
certfile /certs/server.crt
keyfile /certs/server.key
require_certificate true
use_identity_as_username false

listener 9001
protocol websockets
allow_anonymous true

listener 9002
protocol websockets
allow_anonymous true
cafile /certs/ca.crt
certfile /certs/server.crt
keyfile /certs/server.key
require_certificate true
use_identity_as_username false

log_dest stdout
