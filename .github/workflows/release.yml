name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Build Web ───────────────────────────────────────────────────────────────

  build-web:
    name: Build (Web / ${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Web/MqttProbe.Web.csproj
          -c:Release
          -r:${{ matrix.rid }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/web

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd publish/web
          zip -r ../../mqttprobe-web-${{ matrix.rid }}-${{ github.ref_name }}.zip .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/web/* -DestinationPath mqttprobe-web-${{ matrix.rid }}-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-${{ matrix.rid }}
          path: mqttprobe-web-${{ matrix.rid }}-${{ github.ref_name }}.zip

  # ── Build Docker ────────────────────────────────────────────────────────────

  build-docker:
    name: Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            bluegrassiot/mqttprobe
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build MAUI Windows ──────────────────────────────────────────────────────

  build-maui-windows:
    name: Build (MAUI Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: |
            C:/Program Files/dotnet/packs/
            C:/Program Files/dotnet/metadata/workloads/
          key: maui-windows-workload-${{ hashFiles('global.json') }}

      - name: Install MAUI Windows workload
        shell: pwsh
        run: |
          if (-not (dotnet workload list | Select-String 'maui-windows')) {
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          }

      - name: Extract version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          IFS='.-' read -r major minor patch _ <<< "$version"
          echo "code=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-windows10.0.19041.0
          -p:MqttProbeMauiWindowsTargetFrameworksOverride=net10.0-windows10.0.19041.0
          -c:Release
          --output publish/windows
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/mqttprobe-windows-${{ github.ref_name }}.zip -Force

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release (for delta packages)
        shell: pwsh
        continue-on-error: true   # first Velopack release has nothing to download
        run: vpk download github --repoUrl https://github.com/bluegrassiot/mqttprobe --token ${{ secrets.GITHUB_TOKEN }} --outputDir publish/velopack

      - name: Build installer
        shell: pwsh
        run: >
          vpk pack
          --packId MQTTProbe
          --packVersion ${{ steps.version.outputs.value }}
          --packDir publish/windows
          --mainExe MqttProbe.Maui.exe
          --packTitle MQTTProbe
          --packAuthors "Bluegrass IoT"
          --icon src/MqttProbe.Desktop/Assets/icon.ico
          --outputDir publish/velopack

      - name: Remove stale nupkg packages (keep only current version)
        shell: pwsh
        run: >
          Get-ChildItem publish/velopack -Filter *.nupkg |
          Where-Object Name -notlike "MQTTProbe-${{ steps.version.outputs.value }}-*" |
          Remove-Item

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-windows-velopack
          path: publish/velopack/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-windows
          path: publish/mqttprobe-windows-${{ github.ref_name }}.zip

  # ── Build MAUI Android ──────────────────────────────────────────────────────

  build-maui-android:
    name: Build (MAUI Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'

      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Install MAUI Android workload
        run: |
          if ! dotnet workload list | grep -q 'maui-android'; then
            dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
          fi

      - name: Extract version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          # Android versionCode must be a monotonically increasing integer,
          # otherwise devices refuse to install the update over a prior release.
          IFS='.-' read -r major minor patch _ <<< "$version"
          echo "code=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/mqttprobe.keystore"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — APK will be signed with a debug key and users cannot upgrade across releases. See docs/superpowers/RELEASING_ANDROID.md."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (release-signed)
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-android
          -c:Release
          -p:AndroidPackageFormat=apk
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore=${{ runner.temp }}/mqttprobe.keystore
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningStorePass=env:ANDROID_KEYSTORE_PASSWORD
          -p:AndroidSigningKeyPass=env:ANDROID_KEY_PASSWORD
          --output publish/android

      - name: Publish (debug-signed fallback)
        if: steps.keystore.outputs.available != 'true'
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-android
          -c:Release
          -p:AndroidPackageFormat=apk
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}
          --output publish/android

      - name: Rename APK
        run: |
          apk=$(find publish/android -name '*-Signed.apk' | head -n 1)
          if [ -z "$apk" ]; then
            apk=$(find publish/android -name '*.apk' | head -n 1)
          fi
          cp "$apk" "mqttprobe-android-${GITHUB_REF_NAME}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-android
          path: mqttprobe-android-${{ github.ref_name }}.apk

  # ── Build Desktop macOS ─────────────────────────────────────────────────────
  # Photino Desktop (native net10.0) replaces the MAUI Mac Catalyst build, which
  # crashed on launch because Velopack does not support the Catalyst runtime.

  build-macos-desktop:
    name: Build (Desktop macOS)
    uses: ./.github/workflows/build-macos-desktop.yml
    permissions:
      contents: read
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  # ── Build Desktop Linux ────────────────────────────────────────────────────

  build-desktop-linux:
    name: Build (Desktop Linux)
    uses: ./.github/workflows/build-linux-desktop.yml
    permissions:
      contents: read
    with:
      version: ${{ github.ref_name }}

  # ── Create GitHub Release ───────────────────────────────────────────────────

  create-release:
    name: Create Release
    needs: [build-web, build-docker, build-desktop-linux, build-maui-windows, build-macos-desktop, build-maui-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download web-linux-x64
        uses: actions/download-artifact@v8
        with:
          name: web-linux-x64

      - name: Download web-linux-arm64
        uses: actions/download-artifact@v8
        with:
          name: web-linux-arm64

      - name: Download web-win-x64
        uses: actions/download-artifact@v8
        with:
          name: web-win-x64

      - name: Download maui-windows
        uses: actions/download-artifact@v8
        with:
          name: maui-windows

      - name: Download maui-windows-velopack
        uses: actions/download-artifact@v8
        with:
          name: maui-windows-velopack
          path: velopack

      - name: Download desktop-macos-velopack
        uses: actions/download-artifact@v8
        with:
          name: desktop-macos-velopack
          path: velopack-osx

      - name: Download maui-android
        uses: actions/download-artifact@v8
        with:
          name: maui-android

      - name: Download desktop-linux-x64
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-x64

      - name: Download desktop-linux-velopack
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-velopack
          path: velopack-linux

      - name: Fail on duplicate release asset names
        run: |
          DUPES=$(find velopack* -type f -printf '%f\n' 2>/dev/null | sort | uniq -d)
          if [ -n "$DUPES" ]; then echo "::error::Duplicate asset filenames across Velopack channels:"; echo "$DUPES"; exit 1; fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            mqttprobe-web-linux-x64-${{ github.ref_name }}.zip
            mqttprobe-web-linux-arm64-${{ github.ref_name }}.zip
            mqttprobe-web-win-x64-${{ github.ref_name }}.zip
            mqttprobe-windows-${{ github.ref_name }}.zip
            mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip
            mqttprobe-android-${{ github.ref_name }}.apk
            velopack/MQTTProbe-win-Setup.exe
            velopack/*.nupkg
            velopack/releases.win.json
            velopack/assets.win.json
            velopack-linux/*
            velopack-osx/*
          body: |
            ## MQTT Probe ${{ github.ref_name }}

            Requires [.NET 10 runtime](https://dotnet.microsoft.com/download/dotnet/10.0) for the web builds.

            ### Downloads

            | Artifact | Description |
            |----------|-------------|
            | `mqttprobe-web-linux-x64-${{ github.ref_name }}.zip` | Web app (Blazor Server) — single binary, Linux x64 |
            | `mqttprobe-web-linux-arm64-${{ github.ref_name }}.zip` | Web app (Blazor Server) — single binary, Linux arm64 (Raspberry Pi, NAS) |
            | `mqttprobe-web-win-x64-${{ github.ref_name }}.zip` | Web app (Blazor Server) — single exe, Windows x64 |
            | `mqttprobe-windows-${{ github.ref_name }}.zip` | Windows desktop app — MAUI (unsigned, SmartScreen warning expected) |
            | MQTTProbe `.pkg` installer | macOS desktop app (recommended) — universal Intel + Apple Silicon, signed & notarized, auto-updates |
            | `mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip` | Linux desktop app — Photino/Blazor, self-contained (requires `libwebkit2gtk-4.1-0`) |
            | `mqttprobe-android-${{ github.ref_name }}.apk` | Android app — sideload APK, Android 7.0+ (API 24) |
            | `docker pull bluegrassiot/mqttprobe:${{ github.ref_name }}` | Docker image (amd64 + arm64, no runtime install needed) |

            ### Quick Start

            ```bash
            # Docker (recommended for servers)
            docker compose up -d

            # Linux bare metal — extract zip and run
            chmod +x MqttProbe.Web && ./MqttProbe.Web

            # Windows bare metal — extract zip and run
            MqttProbe.Web.exe

            # Linux desktop — extract zip, install WebKitGTK, and run
            sudo apt install libwebkit2gtk-4.1-0
            chmod +x MqttProbe.Desktop && ./MqttProbe.Desktop
            ```

            ### Windows

            Download `MQTTProbe-win-Setup.exe` (installs per-user, auto-updates) or the portable `mqttprobe-windows-*.zip`.

            ### Linux
            Download `MQTTProbe.AppImage` (auto-updates; needs `libfuse2` on Ubuntu 22.04+ and `libwebkit2gtk-4.1`), or the zip for a plain unpacked run.

            ### macOS

            Download the `.pkg` installer (recommended — installs and enables in-app auto-updates) or the portable Velopack zip in the release assets. Both are signed and notarized by Apple, so Gatekeeper accepts them without security prompts.

            ### Android

            Download the APK on your device and open it to install. Your browser will ask you to allow installing unknown apps the first time, and Play Protect may show a warning for apps installed outside the Play Store — choose "Install anyway".

            See [README](https://github.com/bluegrassiot/mqttprobe#readme) for full documentation.
