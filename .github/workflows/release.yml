name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Build Blazor Web ────────────────────────────────────────────────────────

  build-blazor:
    name: Build (Blazor Web / ${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Web/MqttProbe.Web.csproj
          -c:Release
          -r:${{ matrix.rid }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/blazor

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd publish/blazor
          zip -r ../../mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/blazor/* -DestinationPath mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: blazor-${{ matrix.rid }}
          path: mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip

  # ── Build Docker ────────────────────────────────────────────────────────────

  build-docker:
    name: Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            bluegrassiot/mqttprobe
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build MAUI Windows ──────────────────────────────────────────────────────

  build-maui-windows:
    name: Build (MAUI Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: |
            C:/Program Files/dotnet/packs/
            C:/Program Files/dotnet/metadata/workloads/
          key: maui-windows-workload-${{ hashFiles('global.json') }}

      - name: Install MAUI Windows workload
        shell: pwsh
        run: |
          if (-not (dotnet workload list | Select-String 'maui-windows')) {
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          }

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-windows10.0.19041.0
          -p:MqttProbeMauiWindowsTargetFrameworksOverride=net10.0-windows10.0.19041.0
          -c:Release
          --output publish/windows
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/mqttprobe-windows-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-windows
          path: publish/mqttprobe-windows-${{ github.ref_name }}.zip

  # ── Build MAUI Android ──────────────────────────────────────────────────────

  build-maui-android:
    name: Build (MAUI Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Install MAUI Android workload
        run: |
          if ! dotnet workload list | grep -q 'maui-android'; then
            dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
          fi

      - name: Extract version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          # Android versionCode must be a monotonically increasing integer,
          # otherwise devices refuse to install the update over a prior release.
          IFS='.-' read -r major minor patch _ <<< "$version"
          echo "code=$(( major * 10000 + minor * 100 + patch ))" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/mqttprobe.keystore"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — APK will be signed with a debug key and users cannot upgrade across releases. See docs/superpowers/RELEASING_ANDROID.md."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (release-signed)
        if: steps.keystore.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-android
          -c:Release
          -p:AndroidPackageFormat=apk
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore=${{ runner.temp }}/mqttprobe.keystore
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          -p:AndroidSigningStorePass=env:ANDROID_KEYSTORE_PASSWORD
          -p:AndroidSigningKeyPass=env:ANDROID_KEY_PASSWORD
          --output publish/android

      - name: Publish (debug-signed fallback)
        if: steps.keystore.outputs.available != 'true'
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-android
          -c:Release
          -p:AndroidPackageFormat=apk
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}
          -p:ApplicationVersion=${{ steps.version.outputs.code }}
          --output publish/android

      - name: Rename APK
        run: |
          apk=$(find publish/android -name '*-Signed.apk' | head -n 1)
          if [ -z "$apk" ]; then
            apk=$(find publish/android -name '*.apk' | head -n 1)
          fi
          cp "$apk" "mqttprobe-android-${GITHUB_REF_NAME}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: maui-android
          path: mqttprobe-android-${{ github.ref_name }}.apk

  # ── Build MAUI macOS ────────────────────────────────────────────────────────

  build-maui-macos:
    name: Build (MAUI macOS)
    uses: ./.github/workflows/build-macos.yml
    permissions:
      contents: read
    with:
      version: ${{ github.ref_name }}
    secrets: inherit

  # ── Build Desktop Linux ────────────────────────────────────────────────────

  build-desktop-linux:
    name: Build (Desktop Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Install WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-0

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Desktop/MqttProbe.Desktop.csproj
          -c:Release
          -r:linux-x64
          --self-contained
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/desktop

      - name: Archive
        run: |
          cd publish/desktop
          zip -r ../../mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-x64
          path: mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip

  # ── Create GitHub Release ───────────────────────────────────────────────────

  create-release:
    name: Create Release
    needs: [build-blazor, build-docker, build-desktop-linux, build-maui-windows, build-maui-macos, build-maui-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download blazor-linux-x64
        uses: actions/download-artifact@v8
        with:
          name: blazor-linux-x64

      - name: Download blazor-linux-arm64
        uses: actions/download-artifact@v8
        with:
          name: blazor-linux-arm64

      - name: Download blazor-win-x64
        uses: actions/download-artifact@v8
        with:
          name: blazor-win-x64

      - name: Download maui-windows
        uses: actions/download-artifact@v8
        with:
          name: maui-windows

      - name: Download maui-macos
        uses: actions/download-artifact@v8
        with:
          name: maui-macos

      - name: Download maui-android
        uses: actions/download-artifact@v8
        with:
          name: maui-android

      - name: Download desktop-linux-x64
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            mqttprobe-blazor-linux-x64-${{ github.ref_name }}.zip
            mqttprobe-blazor-linux-arm64-${{ github.ref_name }}.zip
            mqttprobe-blazor-win-x64-${{ github.ref_name }}.zip
            mqttprobe-windows-${{ github.ref_name }}.zip
            mqttprobe-macos-${{ github.ref_name }}.zip
            mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip
            mqttprobe-android-${{ github.ref_name }}.apk
          body: |
            ## MQTT Probe ${{ github.ref_name }}

            Requires [.NET 10 runtime](https://dotnet.microsoft.com/download/dotnet/10.0) for the Blazor builds.

            ### Downloads

            | Artifact | Description |
            |----------|-------------|
            | `mqttprobe-blazor-linux-x64-${{ github.ref_name }}.zip` | Blazor Web — single binary, Linux x64 |
            | `mqttprobe-blazor-linux-arm64-${{ github.ref_name }}.zip` | Blazor Web — single binary, Linux arm64 (Raspberry Pi, NAS) |
            | `mqttprobe-blazor-win-x64-${{ github.ref_name }}.zip` | Blazor Web — single exe, Windows x64 |
            | `mqttprobe-windows-${{ github.ref_name }}.zip` | Windows desktop app — MAUI (unsigned, SmartScreen warning expected) |
            | `mqttprobe-macos-${{ github.ref_name }}.zip` | macOS desktop app — universal Intel + Apple Silicon, signed & notarized |
            | `mqttprobe-desktop-linux-x64-${{ github.ref_name }}.zip` | Linux desktop app — Photino/Blazor, self-contained (requires `libwebkit2gtk-4.1-0`) |
            | `mqttprobe-android-${{ github.ref_name }}.apk` | Android app — sideload APK, Android 7.0+ (API 24) |
            | `docker pull bluegrassiot/mqttprobe:${{ github.ref_name }}` | Docker image (amd64 + arm64, no runtime install needed) |

            ### Quick Start

            ```bash
            # Docker (recommended for servers)
            docker compose up -d

            # Linux bare metal — extract zip and run
            chmod +x MqttProbe.Web && ./MqttProbe.Web

            # Windows bare metal — extract zip and run
            MqttProbe.Web.exe

            # Linux desktop — extract zip, install WebKitGTK, and run
            sudo apt install libwebkit2gtk-4.1-0
            chmod +x MqttProbe.Desktop && ./MqttProbe.Desktop
            ```

            ### macOS

            The macOS app is signed and notarized by Apple — unzip and run, no security prompts.

            ### Android

            Download the APK on your device and open it to install. Your browser will ask you to allow installing unknown apps the first time, and Play Protect may show a warning for apps installed outside the Play Store — choose "Install anyway".

            See [README](https://github.com/bluegrassiot/mqttprobe#readme) for full documentation.
