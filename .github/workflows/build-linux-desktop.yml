name: Build Linux (Photino Desktop)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.0.2 or v1.0.2)'
        required: false
        default: '0.0.0'
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp (tag name, e.g. v1.0.2)'
        required: true
        type: string

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-desktop-linux:
    name: Build (Desktop Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Install WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-0

      - name: Extract version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          echo "value=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Desktop/MqttProbe.Desktop.csproj
          -c:Release
          -r:linux-x64
          --self-contained
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/desktop

      - name: Archive
        run: |
          cd publish/desktop
          zip -r ../../mqttprobe-desktop-linux-x64-v${{ steps.version.outputs.value }}.zip .

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous Velopack release (for delta packages)
        continue-on-error: true   # first Velopack linux release has nothing to download
        run: vpk download github --repoUrl https://github.com/bluegrassiot/mqttprobe --token ${{ secrets.GITHUB_TOKEN }} --outputDir publish/velopack-linux

      - name: Build AppImage
        run: >
          vpk pack
          --packId MQTTProbe
          --packVersion ${{ steps.version.outputs.value }}
          --packDir publish/desktop
          --mainExe MqttProbe.Desktop
          --packTitle MQTTProbe
          --packAuthors "Bluegrass IoT"
          --icon src/MqttProbe.Desktop/Assets/icon.png
          --outputDir publish/velopack-linux

      - name: Remove stale nupkg packages (keep only current version)
        run: find publish/velopack-linux -name '*.nupkg' ! -name "MQTTProbe-${{ steps.version.outputs.value }}-*" -delete

      - name: List Velopack output
        run: ls -la publish/velopack-linux

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-velopack
          path: publish/velopack-linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-x64
          path: mqttprobe-desktop-linux-x64-v${{ steps.version.outputs.value }}.zip
