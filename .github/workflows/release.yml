name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Build Blazor Web ────────────────────────────────────────────────────────

  build-blazor:
    name: Build (Blazor Web / ${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Web/MqttProbe.Web.csproj
          -c:Release
          -r:${{ matrix.rid }}
          --self-contained false
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/blazor

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd publish/blazor
          zip ../../mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip MqttProbe.Web

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish/blazor/MqttProbe.Web.exe -DestinationPath mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-${{ matrix.rid }}
          path: mqttprobe-blazor-${{ matrix.rid }}-${{ github.ref_name }}.zip

  # ── Build Docker ────────────────────────────────────────────────────────────

  build-docker:
    name: Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            bluegrassiot/mqttprobe
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build MAUI Windows ──────────────────────────────────────────────────────

  build-maui-windows:
    name: Build (MAUI Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: |
            C:/Program Files/dotnet/packs/
            C:/Program Files/dotnet/metadata/workloads/
          key: maui-windows-workload-${{ hashFiles('global.json') }}

      - name: Install MAUI Windows workload
        shell: pwsh
        run: |
          if (-not (dotnet workload list | Select-String 'maui-windows')) {
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          }

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-windows10.0.19041.0
          -p:MqttProbeMauiWindowsTargetFrameworksOverride=net10.0-windows10.0.19041.0
          -c:Release
          --output publish/windows
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/mqttprobe-windows-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-windows
          path: publish/mqttprobe-windows-${{ github.ref_name }}.zip

  # ── Create GitHub Release ───────────────────────────────────────────────────

  create-release:
    name: Create Release
    needs: [build-blazor, build-docker, build-maui-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            blazor-linux-x64/mqttprobe-blazor-linux-x64-${{ github.ref_name }}.zip
            blazor-linux-arm64/mqttprobe-blazor-linux-arm64-${{ github.ref_name }}.zip
            blazor-win-x64/mqttprobe-blazor-win-x64-${{ github.ref_name }}.zip
            maui-windows/mqttprobe-windows-${{ github.ref_name }}.zip
          body: |
            ## MQTT Probe ${{ github.ref_name }}

            Requires [.NET 10 runtime](https://dotnet.microsoft.com/download/dotnet/10.0) for the Blazor builds.

            ### Downloads

            | Artifact | Description |
            |----------|-------------|
            | `mqttprobe-blazor-linux-x64-${{ github.ref_name }}.zip` | Blazor Web — single binary, Linux x64 |
            | `mqttprobe-blazor-linux-arm64-${{ github.ref_name }}.zip` | Blazor Web — single binary, Linux arm64 (Raspberry Pi, NAS) |
            | `mqttprobe-blazor-win-x64-${{ github.ref_name }}.zip` | Blazor Web — single exe, Windows x64 |
            | `mqttprobe-windows-${{ github.ref_name }}.zip` | Windows desktop app — MAUI (unsigned, SmartScreen warning expected) |
            | `docker pull bluegrassiot/mqttprobe:${{ github.ref_name }}` | Docker image (amd64 + arm64, no runtime install needed) |

            ### Quick Start

            ```bash
            # Docker (recommended for servers)
            docker compose up -d

            # Linux bare metal — extract zip and run
            chmod +x MqttProbe.Web && ./MqttProbe.Web

            # Windows bare metal — extract zip and run
            MqttProbe.Web.exe
            ```

            See [README](https://github.com/bluegrassiot/mqttprobe#readme) for full documentation.
