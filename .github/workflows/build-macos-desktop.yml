name: Build macOS (Photino Desktop)

# Replaces the MAUI Mac Catalyst build. Catalyst runs the app as a UIKit
# process where RuntimeInformation.IsOSPlatform(OSPlatform.OSX) is false, so
# Velopack's VelopackApp.Build().Run() throws "OS platform '' is not supported"
# on launch (velopack/velopack#954). The Photino Desktop project targets plain
# net10.0 and runs as a NATIVE macOS process (WKWebView via Photino.Native.dylib),
# where IsOSPlatform(OSPlatform.OSX) is true and Velopack works normally.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp (e.g. 1.0.1 or v1.0.1)'
        required: false
        default: '0.0.1'
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version to stamp (tag name, e.g. v1.0.1)'
        required: true
        type: string
    secrets:
      MACOS_CERT_P12:
        description: 'Developer ID Application cert + key, .p12, base64-encoded'
        required: true
      MACOS_CERT_PASSWORD:
        description: 'Password protecting the .p12'
        required: true
      NOTARY_KEY_P8:
        description: 'App Store Connect API key (.p8 contents, plain text)'
        required: true
      NOTARY_KEY_ID:
        description: 'App Store Connect API key ID'
        required: true
      NOTARY_ISSUER_ID:
        description: 'App Store Connect issuer ID'
        required: true
      MACOS_INSTALLER_CERT_P12:
        description: 'Developer ID Installer cert + key, .p12, base64-encoded'
        required: true
      MACOS_INSTALLER_CERT_PASSWORD:
        description: 'Password protecting the installer .p12'
        required: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # Subject Common Names of the signing certificates, as they appear in
  # `security find-identity -v`. Not secrets: they are embedded in every signed
  # binary. The "Verify signing identities" step asserts both exist before the
  # build runs, so a mismatch fails in seconds rather than during vpk pack.
  SIGN_APP_IDENTITY: "Developer ID Application: Bluegrass IOT LLC (XVKMB6CQ72)"
  SIGN_INSTALL_IDENTITY: "Developer ID Installer: Bluegrass IOT LLC (XVKMB6CQ72)"

jobs:
  build-desktop-macos:
    name: Build (Desktop macOS)
    # Photino Desktop is plain net10.0 — no MAUI Catalyst workload and no Xcode
    # pinning needed. Any macOS runner works; macos-latest is Apple Silicon,
    # matching the osx-arm64 target and the signing/notarization tooling.
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v6
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Extract and validate version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          version="${RAW#v}"
          if [ -z "$version" ] || [ "$version" = "0.0.0" ]; then
            echo "::error::Version '$version' is invalid. Provide a version >= 0.0.1 (e.g. 1.0.2 or v1.0.2)."
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate into temporary keychain
        env:
          CERT_P12_B64: ${{ secrets.MACOS_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          INSTALLER_CERT_P12_B64: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          [ -n "$CERT_P12_B64" ] || { echo "::error::MACOS_CERT_P12 secret is not set"; exit 1; }
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$KEYCHAIN_PASSWORD" > "$RUNNER_TEMP/keychain-password"
          chmod 600 "$RUNNER_TEMP/keychain-password"
          echo "$CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"
          [ -n "$INSTALLER_CERT_P12_B64" ] || { echo "::error::MACOS_INSTALLER_CERT_P12 secret is not set"; exit 1; }
          echo "$INSTALLER_CERT_P12_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$INSTALLER_CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/pkgbuild -T /usr/bin/productbuild -T /usr/bin/security
          rm "$RUNNER_TEMP/installer.p12"
          # Allow Apple's signing tools to use the key without a GUI consent prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

      - name: Verify signing identities
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "Identities present in the CI keychain:"
          security find-identity -v "$KEYCHAIN"
          for IDENTITY in "$SIGN_APP_IDENTITY" "$SIGN_INSTALL_IDENTITY"; do
            security find-identity -v "$KEYCHAIN" | grep -qF "$IDENTITY" || {
              echo "::error::Signing identity not found: $IDENTITY — compare it against the list above and correct SIGN_APP_IDENTITY / SIGN_INSTALL_IDENTITY in this workflow's env block."
              exit 1
            }
          done

      - name: Create notarytool profile
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          [ -n "$NOTARY_KEY_P8" ] || { echo "::error::NOTARY_KEY_P8 secret is not set"; exit 1; }
          echo "$NOTARY_KEY_P8" > "$RUNNER_TEMP/notary.p8"
          xcrun notarytool store-credentials velopack-profile \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --keychain "$RUNNER_TEMP/signing.keychain-db"
          rm "$RUNNER_TEMP/notary.p8"

      - name: Publish (self-contained, osx-arm64)
        run: >
          dotnet publish src/MqttProbe.Desktop/MqttProbe.Desktop.csproj
          -c:Release
          -r:osx-arm64
          --self-contained
          -p:Version=${{ steps.version.outputs.value }}
          --output publish/desktop

      - name: Generate .icns from icon.png
        # Velopack auto-creates the .app bundle from a plain folder ONLY when
        # given a valid .icns via --icon. The Desktop project ships icon.png /
        # icon.ico but no .icns, so build one here with macOS-native tooling.
        run: |
          SRC="src/MqttProbe.Desktop/Assets/icon.png"
          test -f "$SRC" || { echo "::error::icon source not found: $SRC"; exit 1; }
          ICONSET="$RUNNER_TEMP/icon.iconset"
          mkdir -p "$ICONSET"
          for SPEC in "16:16x16" "32:16x16@2x" "32:32x32" "64:32x32@2x" \
                      "128:128x128" "256:128x128@2x" "256:256x256" "512:256x256@2x" \
                      "512:512x512" "1024:512x512@2x"; do
            PX="${SPEC%%:*}"; NAME="${SPEC##*:}"
            sips -z "$PX" "$PX" "$SRC" --out "$ICONSET/icon_${NAME}.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o "$RUNNER_TEMP/icon.icns"
          test -f "$RUNNER_TEMP/icon.icns" || { echo "::error::iconutil did not produce icon.icns"; exit 1; }

      - name: Write hardened-runtime entitlements
        # Standard .NET-on-macOS entitlements (JIT + unsigned exec memory, etc.).
        # Used both for pre-signing the inner binaries and, via --signEntitlements,
        # for the outer bundle so both layers match. See:
        # https://learn.microsoft.com/dotnet/core/install/macos-notarization-issues
        run: |
          cat > "$RUNNER_TEMP/entitlements.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Pre-sign native binaries
        # Velopack's default 'codesign --deep' recurses into wwwroot and treats
        # dotted static-asset dirs (e.g. _content/MqttProbe.Shared, _content/Blazor.Lucide)
        # as nested bundles, failing with "bundle format unrecognized". Instead we
        # sign every Mach-O binary ourselves here, then pack with --signDisableDeep
        # so codesign only seals the outer bundle and never walks wwwroot.
        # Signatures are embedded in each Mach-O, so they survive vpk copying the
        # publish folder into the .app.
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(cat "$RUNNER_TEMP/keychain-password")
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          ENT="$RUNNER_TEMP/entitlements.plist"
          count=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -q 'Mach-O'; then
              codesign -s "$SIGN_APP_IDENTITY" -f --timestamp --options runtime \
                --entitlements "$ENT" --keychain "$KEYCHAIN" "$f"
              count=$((count + 1))
            fi
          done < <(find publish/desktop -type f -print0)
          echo "Pre-signed $count Mach-O binaries."
          test "$count" -gt 0 || { echo "::error::No Mach-O binaries found to sign — publish output looks wrong."; exit 1; }

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 1.2.0
          command -v vpk

      - name: Velopack pack (wrap .app, sign, notarize, staple)
        timeout-minutes: 15
        run: |
          # Re-unlock keychain and re-apply partition list so productsign can
          # access the Installer cert without a GUI prompt (the keychain may
          # have been re-locked or the partition list lost between steps).
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(cat "$RUNNER_TEMP/keychain-password")
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          echo "Starting vpk pack at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          vpk download github --repoUrl https://github.com/bluegrassiot/mqttprobe --token ${{ secrets.GITHUB_TOKEN }} --outputDir publish/velopack-osx || echo "No previous Velopack osx release; deltas skipped."
          vpk pack \
            --packId MQTTProbe \
            --packVersion ${{ steps.version.outputs.value }} \
            --packDir publish/desktop \
            --mainExe MqttProbe.Desktop \
            --packTitle MQTTProbe \
            --packAuthors "Bluegrass IoT" \
            --icon "$RUNNER_TEMP/icon.icns" \
            --signAppIdentity "$SIGN_APP_IDENTITY" \
            --signInstallIdentity "$SIGN_INSTALL_IDENTITY" \
            --signEntitlements "$RUNNER_TEMP/entitlements.plist" \
            --signDisableDeep \
            --notaryProfile velopack-profile \
            --keychain "$RUNNER_TEMP/signing.keychain-db" \
            --outputDir publish/velopack-osx
          find publish/velopack-osx -name '*.nupkg' ! -name "MQTTProbe-${{ steps.version.outputs.value }}-*" -delete
          ls -la publish/velopack-osx
          echo "Finished vpk pack at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos-velopack
          path: publish/velopack-osx/

      - name: Clean up signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/keychain-password" \
                "$RUNNER_TEMP/cert.p12" \
                "$RUNNER_TEMP/installer.p12" \
                "$RUNNER_TEMP/notary.p8"
