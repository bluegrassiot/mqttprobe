name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Build Blazor Web ────────────────────────────────────────────────────────

  build-blazor:
    name: Build (Blazor Web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish src/MqttProbe.Web/MqttProbe.Web.csproj -f:net10.0 -c:Release --output publish/blazor -p:Version=${{ steps.version.outputs.value }}

      - name: Archive
        run: zip -r publish/mqttprobe-blazor-${{ github.ref_name }}.zip publish/blazor/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-app
          path: publish/mqttprobe-blazor-${{ github.ref_name }}.zip

  # ── Build Docker ────────────────────────────────────────────────────────────

  build-docker:
    name: Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            bluegrassiot/mqttprobe
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build MAUI Windows ──────────────────────────────────────────────────────

  build-maui-windows:
    name: Build (MAUI Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: |
            C:/Program Files/dotnet/packs/
            C:/Program Files/dotnet/metadata/workloads/
          key: maui-windows-workload-${{ hashFiles('global.json') }}

      - name: Install MAUI Windows workload
        shell: pwsh
        run: |
          if (-not (dotnet workload list | Select-String 'maui-windows')) {
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          }

      - name: Extract version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-windows10.0.19041.0
          -p:MqttProbeMauiWindowsTargetFrameworksOverride=net10.0-windows10.0.19041.0
          -c:Release
          --output publish/windows
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.value }}

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/mqttprobe-windows-${{ github.ref_name }}.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-windows
          path: publish/mqttprobe-windows-${{ github.ref_name }}.zip

  # ── Create GitHub Release ───────────────────────────────────────────────────

  create-release:
    name: Create Release
    needs: [build-blazor, build-docker, build-maui-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            blazor-app/mqttprobe-blazor-${{ github.ref_name }}.zip
            maui-windows/mqttprobe-windows-${{ github.ref_name }}.zip
          body: |
            ## MQTT Probe ${{ github.ref_name }}

            ### Downloads

            | Artifact | Description |
            |----------|-------------|
            | `mqttprobe-blazor-${{ github.ref_name }}.zip` | Blazor Web app — extract and run on any machine with .NET 10 |
            | `mqttprobe-windows-${{ github.ref_name }}.zip` | Windows desktop app (unsigned — SmartScreen warning expected) |
            | `docker pull bluegrassiot/mqttprobe:${{ github.ref_name }}` | Docker image |

            ### Quick Start

            ```bash
            # Docker
            docker compose up -d

            # Or extract the Blazor zip and run
            dotnet MqttProbe.Web.dll
            ```

            See [README](https://github.com/bluegrassiot/mqttprobe#readme) for full documentation.
