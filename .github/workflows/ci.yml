name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  # ── Stage: test ──────────────────────────────────────────────────────────────

  test:
    name: Test (Unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Restore tools
        run: dotnet tool restore

      - name: Format check
        run: |
          dotnet format MqttProbe.NoMaui.slnf --verify-no-changes \
            --exclude "**/LucideIcons.cs" \
            --exclude "**/SparkplugBProtobuf.cs"

      - name: Unit tests
        run: |
          dotnet test tests/MqttProbe.Tests/MqttProbe.Shared.Tests.csproj \
            -p:TreatWarningsAsErrors=true \
            -p:MSBuildTreatWarningsAsErrors=true \
            --logger:trx \
            --results-directory ./TestResults/unit \
            --settings tests/coverlet.runsettings \
            --collect:"XPlat Code Coverage"

      - name: Coverage threshold check
        shell: pwsh
        run: |
          $reports = (Get-ChildItem -Path ./TestResults -Filter 'coverage.opencover.xml' -Recurse |
            Select-Object -ExpandProperty FullName) -join ';'
          dotnet reportgenerator `
            "-reports:$reports" `
            "-targetdir:./TestResults/CoverageReport" `
            "-reporttypes:Html;TextSummary" `
            "-assemblyfilters:+MqttProbe.Shared;+MqttProbe.Web" `
            "-filefilters:-*SparkplugBProtobuf*"
          $summary = Get-Content ./TestResults/CoverageReport/Summary.txt -ErrorAction SilentlyContinue
          $summary
          $line = $summary |
            Select-String 'Line coverage:\s+([\d.]+)%' |
            ForEach-Object { [double]$_.Matches[0].Groups[1].Value }
          if ($line -lt 75) { Write-Error "Line coverage $line% is below 75% threshold"; exit 1 }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  # ── Stage: build ─────────────────────────────────────────────────────────────

  build-blazor:
    name: Build (Blazor Web)
    needs: test
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('src/MqttProbe.Shared/MqttProbe.Shared.csproj', 'global.json') }}
          restore-keys: nuget-

      - name: Publish
        run: dotnet publish src\MqttProbe.Web\MqttProbe.Web.csproj -f:net10.0 -c:Release --output publish/blazor

      - name: Archive
        shell: pwsh
        run: Compress-Archive -Path publish/blazor/* -DestinationPath publish/blazor-app.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-app
          path: publish/blazor-app.zip
          retention-days: 7

  build-docker:
    name: Build (Docker)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-maui-windows:
    name: Build (MAUI Windows)
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: |
            C:/Program Files/dotnet/packs/
            C:/Program Files/dotnet/metadata/workloads/
          key: maui-windows-workload-${{ hashFiles('global.json') }}

      - name: Install MAUI Windows workload
        shell: pwsh
        run: |
          if (-not (dotnet workload list | Select-String 'maui-windows')) {
            dotnet workload install maui-windows --source https://api.nuget.org/v3/index.json
          }

      - name: Publish
        run: >
          dotnet publish src/MqttProbe.Maui/MqttProbe.Maui.csproj
          -f:net10.0-windows10.0.19041.0
          -p:MqttProbeMauiWindowsTargetFrameworksOverride=net10.0-windows10.0.19041.0
          -c:Debug
          --output publish/windows

      - name: Archive
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path publish/windows -Filter '*.exe' -Recurse | Select-Object -First 1
          if ($exe) { Compress-Archive -Path $exe.FullName -DestinationPath publish/windows-app.exe -Force }
          $msix = Get-ChildItem -Path publish/windows -Filter '*.msix' -Recurse | Select-Object -First 1
          if ($msix) { Compress-Archive -Path $msix.FullName -DestinationPath publish/windows-app.msix -Force }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: maui-windows
          path: publish/
          retention-days: 7
